name: Desktop Release Packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version_override:
        description: "Version tag to build (e.g. v0.1.0) — leave blank for current pyproject.toml version"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  # --------------------------------------------------------------------------
  # AppImage — Linux amd64
  # --------------------------------------------------------------------------
  appimage-amd64:
    name: AppImage (linux/amd64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging deps
        run: |
          python -m pip install --upgrade pip
          pip install "python-appimage>=1.2"

      - name: Install FUSE (required by AppImage runtime)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libfuse2

      - name: Build AppImage
        run: bash scripts/build_appimage.sh --arch amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-amd64
          path: dist/SAEBooks-*-x86_64.AppImage
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # AppImage — Linux arm64
  # --------------------------------------------------------------------------
  appimage-arm64:
    name: AppImage (linux/arm64)
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging deps
        run: |
          python -m pip install --upgrade pip
          pip install "python-appimage>=1.2"

      - name: Install FUSE (required by AppImage runtime)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libfuse2

      - name: Build AppImage
        run: bash scripts/build_appimage.sh --arch arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-arm64
          path: dist/SAEBooks-*-aarch64.AppImage
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # MSI — Windows x64
  # --------------------------------------------------------------------------
  msi-windows:
    name: MSI (windows/x64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - name: Install runtime and packaging deps
        run: |
          python -m pip install --upgrade pip
          pip install "cx_Freeze>=7.2"
          pip install -e ".[dev]"

      - name: Build MSI
        run: scripts\build_msi.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-x64
          path: dist\SAEBooks-*-x64.msi
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Attach all artifacts to the GitHub Release (tag builds only)
  # --------------------------------------------------------------------------
  release:
    name: Attach to GitHub Release
    runs-on: ubuntu-latest
    needs: [appimage-amd64, appimage-arm64, msi-windows]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/
          merge-multiple: true

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          fail_on_unmatched_files: true
